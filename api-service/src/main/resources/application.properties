# ===============================
# SERVER CONFIGURATION
# ===============================
server.port=8080
spring.application.name=vibe-api

# ===============================
# SPOTIFY CONFIGURATION
# ===============================
# Replace these with your NEW keys after rotation
spring.security.oauth2.client.registration.spotify.client-id=aa79355e4e52474e958a8a0ece6bfc39
spring.security.oauth2.client.registration.spotify.client-secret=f7f812750db544949b6c66136dfaa95b

spring.security.oauth2.client.registration.spotify.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.spotify.redirect-uri=http://127.0.0.1:8080/login/oauth2/code/spotify
spring.security.oauth2.client.registration.spotify.scope=playlist-read-private,playlist-read-collaborative,user-library-read

# ===============================
# PROVIDER DETAILS (The Fix)
# ===============================
# 1. Where do we send the user to login?
spring.security.oauth2.client.provider.spotify.authorization-uri=https://accounts.spotify.com/authorize

# 2. Where do we trade the code for a token?
spring.security.oauth2.client.provider.spotify.token-uri=https://accounts.spotify.com/api/token

# 3. Where do we get the user's profile?
spring.security.oauth2.client.provider.spotify.user-info-uri=https://api.spotify.com/v1/me

# 4. Which field in the JSON is the username?
spring.security.oauth2.client.provider.spotify.user-name-attribute=id

# DATABASE things
# database for vibeEntangled
spring.datasource.url=jdbc:postgresql://localhost:5432/vibeentangled
spring.datasource.username=postgres
spring.datasource.password=password123
spring.datasource.driver-class-name=org.postgresql.Driver

#hibernate (auto create tables)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
#jpa show sql will show exaclty what SQL is running in the console